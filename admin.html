<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel – King Sports Kashmir</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- AUTH LOADING -->
<div id="auth-loading" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0e1f38,#060e1c)">
  <div style="text-align:center">
    <div style="width:48px;height:48px;border:3px solid rgba(212,168,71,0.2);border-top-color:#D4A847;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem"></div>
    <p style="color:#8a9ab5;font-size:0.9rem">Checking authentication...</p>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<!-- LOGIN SECTION -->
<div id="login-section" style="display:none">
  <div class="login-box">
    <div class="login-logo">👑</div>
    <h2 class="login-title">Admin Login</h2>
    <p class="login-subtitle">King Sports Kashmir Dashboard</p>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="admin-email">Email</label>
        <input type="email" id="admin-email" class="form-input" placeholder="admin@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="admin-pass">Password</label>
        <input type="password" id="admin-pass" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Login to Dashboard</button>
    </form>

    <p style="margin-top:1.5rem;color:var(--muted);font-size:0.8rem">
      ← <a href="index.html" style="color:var(--gold)">Back to Website</a>
    </p>
  </div>
</div>

<!-- DASHBOARD SECTION -->
<div id="dashboard-section" style="display:none">

  <header class="admin-header">
    <div class="admin-brand">
      <div class="admin-brand-icon">👑</div>
      <h1>King Sports Kashmir · Admin</h1>
    </div>
    <div class="admin-user">
      <span id="admin-email-display"></span>
      <button class="btn-logout" id="logout-btn">Logout</button>
    </div>
  </header>

  <main class="admin-main">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-num" id="stat-products">–</span>
        <span class="stat-label">Total Products</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="stat-stock">–</span>
        <span class="stat-label">Total Units in Stock</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="stat-value">–</span>
        <span class="stat-label">Inventory Value</span>
      </div>
      <div class="stat-card">
        <span class="stat-num">WhatsApp</span>
        <span class="stat-label">Checkout Method</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn" data-tab="add">➕ Add Product</button>
      <button class="tab-btn active" data-tab="products">📋 Products</button>
    </div>

    <!-- ADD PRODUCT TAB -->
    <div class="tab-pane" id="tab-add">
      <div class="product-form-box">
        <h2 class="form-title" id="form-title">➕ Add Product</h2>

        <form id="product-form">
          <div class="form-grid">

            <div class="form-group">
              <label class="form-label" for="product-name">Product Name *</label>
              <input type="text" id="product-name" class="form-input" placeholder="e.g. Street King Pro" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="product-price">Price (₹) *</label>
              <input type="number" id="product-price" class="form-input" placeholder="2999" min="0" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="product-category">Category *</label>
              <input type="text" id="product-category" class="form-input" placeholder="e.g. Kashmir Willow, Junior, English Willow" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="product-stock">Stock Quantity *</label>
              <input type="number" id="product-stock" class="form-input" placeholder="10" min="0" required>
            </div>

            <div class="form-group form-full">
              <label class="form-label" for="product-desc">Description</label>
              <textarea id="product-desc" class="form-textarea" placeholder="Describe this bat — weight, grade, ideal for..."></textarea>
            </div>

            <div class="form-group form-full">
              <label class="form-label" for="product-image">Image URL</label>
              <input type="url" id="product-image" class="form-input" placeholder="https://res.cloudinary.com/... or https://images.unsplash.com/...">
              <img id="image-preview" class="image-preview" alt="Preview">
            </div>

            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="product-featured">
                ★ Mark as Featured (shows on homepage)
              </label>
            </div>

            <div class="form-actions form-full">
              <button type="submit" class="btn-save">Save Product</button>
              <button type="button" class="btn-cancel" id="cancel-edit">Cancel Edit</button>
            </div>

          </div>
        </form>
      </div>
    </div>

    <!-- PRODUCTS TABLE TAB -->
    <div class="tab-pane active" id="tab-products">
      <div class="table-box">
        <div class="table-header">
          <h2>All Products</h2>
          <button class="btn-refresh" id="refresh-btn">↻ Refresh</button>
        </div>
        <div style="overflow-x:auto">
          <table class="products-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Category</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="products-tbody">
              <tr><td colspan="6" style="text-align:center;padding:3rem;color:var(--muted)">Loading products...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </main>
</div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
